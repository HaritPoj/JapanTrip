<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>JapanTrip</title>
    <style>
        body { font-family: 'Kanit', sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .card-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .place-card {
            border: 1px solid #ddd;
            border-radius: 15px;
            padding: 20px;
            width: 200px;
            background: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .place-card:hover { transform: translateY(-10px); box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .place-card img { width: 100%; border-radius: 10px; }
        h2 { color: #333; }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>

    <h1>Japan Trip</h1>
    
    <div class="card-container">
        <a href="html/mainTrip.html">
            <div class="place-card">
                <img src="pic\jpm.jpg" alt="placeholder">
                <h3>Main Trip (maintainence)</h3>
            </div>
        </a>
        <a href="html/manhole.html">
            <div class="place-card">
                <img src="pic\jpmh.jpg" alt="placeholder">
                <h3>Manhole</h3>
            </div>
        </a>

        
    </div>

</body>
</html>
